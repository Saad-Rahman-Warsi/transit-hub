# Open Transit Hub — Kubernetes Manifests
# Apply with: kubectl apply -f kubernetes/
#
# Prerequisites:
#   kubectl create secret generic gtfs-rt-secret \
#     --from-literal=subscription-key=<your-key>

---
# ── Secret (subscription key) ──────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: gtfs-rt-secret
  namespace: transit-hub
type: Opaque
# Base64-encode your key: echo -n "your-key" | base64
# Then replace the placeholder below
stringData:
  subscription-key: "REPLACE_WITH_YOUR_KEY"

---
apiVersion: v1
kind: Namespace
metadata:
  name: transit-hub

---
# ── API Gateway ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: transit-hub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: transithub/api-gateway:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: transit-hub
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080

---
# ── Stop Service ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stop-service
  namespace: transit-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stop-service
  template:
    metadata:
      labels:
        app: stop-service
    spec:
      containers:
        - name: stop-service
          image: transithub/stop-service:latest
          ports:
            - containerPort: 8081
          resources:
            requests:
              memory: "512Mi"   # GTFS static zip takes some memory
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: stop-service
  namespace: transit-hub
spec:
  selector:
    app: stop-service
  ports:
    - port: 8081
      targetPort: 8081

---
# ── Arrivals Service ───────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arrivals-service
  namespace: transit-hub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: arrivals-service
  template:
    metadata:
      labels:
        app: arrivals-service
    spec:
      containers:
        - name: arrivals-service
          image: transithub/arrivals-service:latest
          ports:
            - containerPort: 8082
          env:
            - name: GTFS_RT_SUBSCRIPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: gtfs-rt-secret
                  key: subscription-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: arrivals-service
  namespace: transit-hub
spec:
  selector:
    app: arrivals-service
  ports:
    - port: 8082
      targetPort: 8082

---
# ── Vehicles Service ───────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vehicles-service
  namespace: transit-hub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vehicles-service
  template:
    metadata:
      labels:
        app: vehicles-service
    spec:
      containers:
        - name: vehicles-service
          image: transithub/vehicles-service:latest
          ports:
            - containerPort: 8083
          env:
            - name: GTFS_RT_SUBSCRIPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: gtfs-rt-secret
                  key: subscription-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: vehicles-service
  namespace: transit-hub
spec:
  selector:
    app: vehicles-service
  ports:
    - port: 8083
      targetPort: 8083

---
# ── Alerts Service ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alerts-service
  namespace: transit-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alerts-service
  template:
    metadata:
      labels:
        app: alerts-service
    spec:
      containers:
        - name: alerts-service
          image: transithub/alerts-service:latest
          ports:
            - containerPort: 8084
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: alerts-service
  namespace: transit-hub
spec:
  selector:
    app: alerts-service
  ports:
    - port: 8084
      targetPort: 8084

---
# ── Frontend ───────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: transit-hub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: transithub/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: transit-hub
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
