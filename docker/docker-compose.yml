version: "3.9"

# Open Transit Hub — Docker Compose
#
# Usage:
#   export GTFS_RT_SUBSCRIPTION_KEY=<your-key-from-nextrip-public-api.developer.azure-api.net>
#   docker-compose up
#
# Frontend will be at http://localhost:3000
# API Gateway at      http://localhost:8080

services:

  # ── Spring Cloud Gateway ────────────────────────────────────────────────────
  api-gateway:
    build: ./backend/api-gateway
    image: transithub/api-gateway:latest
    ports:
      - "8080:8080"
    depends_on:
      - stop-service
      - arrivals-service
      - vehicles-service
      - alerts-service
    networks:
      - transit-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Stop Service (GTFS static) ───────────────────────────────────────────────
  stop-service:
    build: ./backend/stop-service
    image: transithub/stop-service:latest
    ports:
      - "8081:8081"
    networks:
      - transit-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/stops/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Arrivals Service (GTFS-RT TripUpdates) ──────────────────────────────────
  arrivals-service:
    build: ./backend/arrivals-service
    image: transithub/arrivals-service:latest
    ports:
      - "8082:8082"
    environment:
      - GTFS_RT_SUBSCRIPTION_KEY=${GTFS_RT_SUBSCRIPTION_KEY}
    networks:
      - transit-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/arrivals/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Vehicles Service (GTFS-RT VehiclePositions) ─────────────────────────────
  vehicles-service:
    build: ./backend/vehicles-service
    image: transithub/vehicles-service:latest
    ports:
      - "8083:8083"
    environment:
      - GTFS_RT_SUBSCRIPTION_KEY=${GTFS_RT_SUBSCRIPTION_KEY}
    networks:
      - transit-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/vehicles/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Alerts Service (RSS feed) ────────────────────────────────────────────────
  alerts-service:
    build: ./backend/alerts-service
    image: transithub/alerts-service:latest
    ports:
      - "8084:8084"
    networks:
      - transit-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/alerts/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    image: transithub/frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api
    networks:
      - transit-net

networks:
  transit-net:
    driver: bridge
