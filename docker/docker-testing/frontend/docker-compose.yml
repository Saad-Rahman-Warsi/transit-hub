version: "3.9"

# Open Transit Hub — Docker Compose
#
# Usage:
#   export GTFS_RT_SUBSCRIPTION_KEY=<your-key-from-nextrip-public-api.developer.azure-api.net>
#   docker-compose up
#
# Frontend will be at http://localhost:3000
# API Gateway at      http://localhost:8080

services:
  # ── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    image: transit-hub-frontend:1.0.0
    ports:
      - "80:8080"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api
    networks:
      - transit-net

networks:
  transit-net:
    driver: bridge
